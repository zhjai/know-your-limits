<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="know-your-limits — a cheap worker escalates the hard parts to a senior model on objective tripwires">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Title block -->
  <text x="64" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="58" font-weight="700" fill="#f8fafc">know-your-limits</text>
  <text x="66" y="166" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="25" fill="#c4b5fd">Know when the cheap model is out of its depth — and phone a senior.</text>
  <text x="66" y="206" font-family="-apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#94a3b8">Objective tripwires, not "do you feel unsure?" · the policy of WHEN to escalate</text>

  <!-- Escalation flow diagram -->
  <g transform="translate(66,238)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">
    <!-- cheap worker -->
    <rect x="0" y="0" width="190" height="44" rx="10" fill="#1f2937" stroke="#374151"/>
    <text x="95" y="21" text-anchor="middle" fill="#e5e7eb" font-size="14">cheap worker</text>
    <text x="95" y="37" text-anchor="middle" fill="#9ca3af" font-size="11.5">Haiku · GLM · mini</text>

    <!-- arrow 1 -->
    <line x1="198" y1="22" x2="300" y2="22" stroke="url(#accent)" stroke-width="2.5"/>
    <polygon points="300,22 290,17 290,27" fill="#f472b6"/>
    <text x="249" y="14" text-anchor="middle" fill="#a78bfa" font-size="12">tripwire</text>

    <!-- senior -->
    <rect x="308" y="0" width="190" height="44" rx="10" fill="#312e81" stroke="#4f46e5" filter="url(#soft)"/>
    <text x="403" y="21" text-anchor="middle" fill="#ede9fe" font-size="14">senior model</text>
    <text x="403" y="37" text-anchor="middle" fill="#c4b5fd" font-size="11.5">via agent-arena</text>

    <!-- arrow 2 -->
    <line x1="506" y1="22" x2="608" y2="22" stroke="#475569" stroke-width="2.5" stroke-dasharray="5 4"/>
    <polygon points="608,22 598,17 598,27" fill="#64748b"/>
    <text x="557" y="14" text-anchor="middle" fill="#64748b" font-size="12">if stuck</text>

    <!-- human -->
    <rect x="616" y="0" width="150" height="44" rx="10" fill="#1f2937" stroke="#374151"/>
    <text x="691" y="21" text-anchor="middle" fill="#e5e7eb" font-size="14">human</text>
    <text x="691" y="37" text-anchor="middle" fill="#9ca3af" font-size="11.5">backstop</text>
  </g>

  <!-- Right-side tripwire chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" text-anchor="middle">
    <g transform="translate(910,60)">
      <rect width="230" height="34" rx="17" fill="#1e1b4b" stroke="#6d28d9"/>
      <text x="115" y="22" fill="#ddd6fe">PLAN_REVIEW</text>
    </g>
    <g transform="translate(910,104)">
      <rect width="230" height="34" rx="17" fill="#1e1b4b" stroke="#6d28d9"/>
      <text x="115" y="22" fill="#ddd6fe">IRREVERSIBLE_GUARD</text>
    </g>
    <g transform="translate(910,148)">
      <rect width="230" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
      <text x="115" y="22" fill="#94a3b8">STALL_RESCUE</text>
    </g>
    <g transform="translate(910,192)">
      <rect width="230" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
      <text x="115" y="22" fill="#94a3b8">OSCILLATION</text>
    </g>
    <g transform="translate(910,236)">
      <rect width="230" height="34" rx="17" fill="#0f172a" stroke="#334155"/>
      <text x="115" y="22" fill="#94a3b8">SCOPE_DRIFT · DEBT</text>
    </g>
  </g>
</svg>
