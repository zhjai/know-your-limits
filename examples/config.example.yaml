# know-your-limits configuration
# Created automatically on first use

worker:
  # Tier: cheap | expensive | auto-detect
  tier: auto-detect
  
escalation:
  # Senior model to escalate to (or auto-detect for cross-vendor heterogeneity)
  senior_model: auto-detect  # auto-detect | claude-opus-4-8 | codex-5.5 | glm-4-plus

  # Fallback order when escalation fails (senior -> human tiers, NOT CLI fallback)
  fallback_order:
    - senior        # Try senior model first
    - human_async   # If senior fails, async human via grill-feishu
    - human_sync    # If no grill-feishu, synchronous block

  # Free-form provider notes the agent reads and HONORS when choosing/invoking the senior.
  # Use this for anything the rigid fields above can't capture — endpoint quirks, CLI
  # fallbacks, channel preferences. The agent handles it flexibly rather than parsing a schema.
  notes: |
    # Example:
    # Primary codex runs on the sakura886 endpoint.
    # If codex is unavailable, fall back to the codex-official CLI (Plus channel).
  
  # Arena mode preferences: adaptive by default (not all escalations need two agents)
  # Judgment calls (PLAN_REVIEW, IRREVERSIBLE_GUARD, PRE_DONE_REVIEW, scope) → heterogeneous
  # Bounded diagnosis (STALL_RESCUE, OSCILLATION) → single senior (solo_red_team)
  #
  # depth: heterogeneous | single_senior
  # Override any trigger here; defaults shown below
  mode_preferences:
    PLAN_REVIEW:
      mode: implementation_plan_review
      depth: heterogeneous
      # heterogeneous default; if forced to single: Claude (planning/long-context reasoning)
    IRREVERSIBLE_GUARD:
      mode: full_arena
      depth: heterogeneous
      # heterogeneous default; if forced to single: Claude
    PRE_DONE_REVIEW:
      mode: code_review_arena
      depth: heterogeneous
      # heterogeneous default; if forced to single: Claude
    STALL_RESCUE:
      mode: solo_red_team
      depth: single_senior
      senior_model: best_code_senior  # strongest GPT/Codex-family model available (must be stronger than current worker)
    OSCILLATION:
      mode: solo_red_team
      depth: single_senior
      senior_model: best_code_senior  # same reason
    SCOPE_DRIFT:
      mode: quick_panel
      depth: heterogeneous
    CHECKPOINT_DEBT:
      mode: quick_panel
      depth: heterogeneous
    GATE_BLOCK:
      mode: solo_red_team
      depth: single_senior
      senior_model: best_code_senior  # diagnose the concrete gate failure
  # Global override (uncomment to force all escalations to one depth):
  # default_depth: heterogeneous   # always two agents (max scrutiny)
  # default_depth: single_senior   # always one agent (max speed/cost)

notifications:
  # Task completion notification — sent when done is declared (fire-and-forget)
  # Escalation questions — sent when HUMAN_REQUIRED (awaits reply)
  # Both use experiment-grill-feishu if installed
  completion:
    enabled: false         # set true to get a Feishu ping when the task finishes
    provider: experiment-grill-feishu

limits:
  # Budget per task class
  max_l1_calls: 1   # L1: ordinary multi-step
  max_l2_calls: 3   # L2: long-running (reserve 1 for final review)
  max_l3_calls: 4   # L3: high-risk (reserve 1 for plan + 1 for final)
